[uwsgi]
# Run in master mode with 4 worker processes.
# Increase 'workers' if you need higher throughput.
master = true
workers = 4
# Recycle workers after 500 requests to prevent memory leaks.
max-requests = 500
# Use the cheapest (static) cheaper algorithm.
cheaper-algo = spare
cheaper = 2
cheaper-initial = 4
# Socket bound inside the container; nginx / Caddy should proxy to this.
socket = /run/uwsgi/app.socket
chmod-socket = 666
# Disable request logging to keep the logs clean; SearXNG logs searches itself.
disable-logging = true
# Keep alive connections for better throughput.
http-keepalive = true
# Increase buffer sizes for large JSON payloads.
buffer-size = 32768
post-buffering = 8192
