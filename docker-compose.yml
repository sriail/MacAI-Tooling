services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8888}:8888"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8888/}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-changeme-use-a-long-random-secret}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
